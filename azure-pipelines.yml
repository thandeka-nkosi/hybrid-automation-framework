# ===== Trigger on pushes to main (edit as you like) =====
trigger:
  branches:
    include: [ main ]

# ===== Use Microsoft-hosted Ubuntu agent =====
pool:
  vmImage: ubuntu-latest

# ===== Handy variables =====
variables:
  MAVEN_CACHE_FOLDER: $(Pipeline.Workspace)/.m2
  MODULE: ui-tests          # your test module folder name
  EXECUTION: local          # default: local (set to 'remote' to use Selenium Grid job below)
  BROWSER: chrome

steps:
  # ---------- Checkout ----------
  - checkout: self
    clean: true

  # ---------- Cache Maven repo ----------
  - task: Cache@2
    displayName: Cache Maven dependencies
    inputs:
      key: 'maven | "$(Agent.OS)" | **/pom.xml'
      restoreKeys: 'maven | "$(Agent.OS)"'
      path: '$(MAVEN_CACHE_FOLDER)'

  # ---------- Build (no tests) ----------
  - script: |
      mvn -q -B -Dmaven.repo.local=$(MAVEN_CACHE_FOLDER) -DskipTests clean install
    displayName: Build project

  # ---------- Run UI tests (LOCAL mode) ----------
  - script: |
      echo "Running module=$(MODULE) execution=$(EXECUTION) browser=$(BROWSER)"
      mvn -q -B -Dmaven.repo.local=$(MAVEN_CACHE_FOLDER) \
        -pl $(MODULE) -am \
        -Dexecution=$(EXECUTION) \
        -Dbrowser=$(BROWSER) \
        -D"cucumber.plugin=pretty, junit:target/surefire-reports/TEST-cucumber.xml" \
        test
    displayName: Run UI tests (LOCAL)

  # ---------- Publish JUnit results to Tests tab ----------
  - task: PublishTestResults@2
    displayName: Publish JUnit results
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '$(MODULE)/target/surefire-reports/TEST-*.xml'
      failTaskOnFailedTests: false

  # ---------- Publish Extent report & screenshots as artifacts ----------
  - task: PublishPipelineArtifact@1
    displayName: Publish Extent report
    inputs:
      targetPath: '$(MODULE)/test-output/reports'
      artifact: 'extent-report'
      publishLocation: 'pipeline'

  - task: PublishPipelineArtifact@1
    displayName: Publish screenshots
    condition: always()          # upload even on failures
    inputs:
      targetPath: '$(MODULE)/screenshots'
      artifact: 'screenshots'
      publishLocation: 'pipeline'

